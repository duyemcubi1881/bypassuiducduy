services:
  - type: web
    name: uid-bypass-server
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATA_DIR
        value: /data
    disk:
      name: uid-data
      mountPath: /data
      sizeGB: 1
